# App runs on the same port used in our live-coded projects
server.port=9002

# MySQL datasource
#spring.datasource.url=jdbc:mysql://localhost:3306/subscription_manager?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/subscription_manager
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JPA - Hibernate
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Settings
app.jwt.expirationMinutes=1440
app.jwt.secret=i-am-a-super-secret-i-am-a-super-secret-i-am-a-super-secret

#logging.level.root=debug

# SpringDoc OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
